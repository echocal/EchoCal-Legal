<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoCal - Dokumentacja Prawna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --text: #000000;
            --text-secondary: #8E8E93;
            --surface: #F2F2F7;
            --border: #E5E5EA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .legal-card {
            background-color: #FFFFFF;
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
        }

        .icon-top {
            width: 60px;
            height: 60px;
            background-color: var(--surface);
            border-radius: 18px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .legal-btn {
            background-color: var(--surface);
            color: var(--text);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .legal-btn:hover {
            background-color: #EBEBEF;
            border-color: var(--border);
            transform: scale(1.02);
        }

        .legal-btn.primary {
            background-color: var(--text);
            color: #FFF;
        }

        .legal-btn.primary:hover {
            background-color: #1c1c1e;
            transform: scale(1.02);
        }

        .copyright {
            margin-top: 40px;
            color: #CCC;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="legal-card">
        <div class="icon-top">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        </div>
        <h1>EchoCal</h1>
        <p>Dokumentacja prawna i warunki korzystania z aplikacji.</p>

        <div class="btn-group">
            <a href="privacy.html" class="legal-btn primary">Polityka Prywatności</a>
            <a href="terms.html" class="legal-btn">Regulamin Użytkowania</a>
        </div>

        <div class="copyright">EchoCal 2026</div>
    </div>

</body>
</html>
